name: Update Nix npm Hash

# Routes hash updates through a PR with auto-merge instead of pushing
# to main. A direct push using GITHUB_TOKEN is rejected with `GH013:
# Repository rule violations` because the main branch ruleset enforces
# "Require a pull request before merging" plus 14 status checks.
# Mirrors the existing open-release-pr.yml pattern.

on:
  push:
    branches: [main]
    paths:
      - web/package-lock.json
  workflow_dispatch:

concurrency:
  group: nix-npm-hash
  cancel-in-progress: true

jobs:
  update-hash:
    name: Recompute npmDepsHash and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # GITHUB_TOKEN cannot be used here, see header for the GH013 reason.
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      - name: Compute new npmDepsHash
        id: hash
        run: |
          set -euo pipefail

          FAKE="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

          # flake.nix has `npmDepsHash` mentions in comments too; the
          # anchor + count assertion ensures CURRENT and the sed-i below
          # both target exactly the assignment line.
          MATCHES=$(grep -cE '^[[:space:]]*npmDepsHash[[:space:]]*=[[:space:]]*"sha256-' flake.nix)
          if [ "$MATCHES" -ne 1 ]; then
            echo "::error::expected exactly 1 npmDepsHash assignment in flake.nix, found $MATCHES"
            exit 1
          fi
          CURRENT=$(grep -E '^[[:space:]]*npmDepsHash[[:space:]]*=[[:space:]]*"sha256-' flake.nix \
            | sed 's/.*npmDepsHash[[:space:]]*=[[:space:]]*"\(sha256-[^"]*\)".*/\1/')

          sed -i -E "/^[[:space:]]*npmDepsHash[[:space:]]*=[[:space:]]*\"sha256-/s|sha256-[^\"]*|$FAKE|" flake.nix

          # A `got:` line is the hash-mismatch signal we want; absence of
          # it with rc != 0 is an unrelated build failure that must be
          # surfaced rather than swallowed.
          set +e
          nix build --no-link --impure \
            .#packages.x86_64-linux.aoe-with-web 2>&1 \
            | tee /tmp/nix-build.log
          NIX_RC=${PIPESTATUS[0]}
          set -e
          REAL=$(grep "got:" /tmp/nix-build.log \
            | sed 's/.*got:[[:space:]]*//' \
            | tr -d '[:space:]' \
            | head -n1 || true)

          if [ -z "$REAL" ]; then
            if [ "$NIX_RC" -ne 0 ]; then
              echo "::error::nix build failed for a non-hash-mismatch reason (rc=$NIX_RC)"
              echo "Tail of build log:"
              tail -n 50 /tmp/nix-build.log || true
              git checkout -- flake.nix
              exit 1
            fi
            echo "Hash already correct (no got: line and nix build succeeded)."
            git checkout -- flake.nix
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REAL" = "$CURRENT" ]; then
            echo "Computed hash matches current flake.nix; nothing to do."
            git checkout -- flake.nix
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New hash: $REAL (was: $CURRENT)"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "hash=$REAL" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Patch flake.nix with real hash
        if: steps.hash.outputs.changed == 'true'
        run: |
          REAL="${{ steps.hash.outputs.hash }}"
          sed -i -E "/^[[:space:]]*npmDepsHash[[:space:]]*=[[:space:]]*\"sha256-/s|sha256-[^\"]*|$REAL|" flake.nix
          echo "Updated flake.nix:"
          grep -E '^[[:space:]]*npmDepsHash[[:space:]]*=' flake.nix

      - name: Reset bot branch on top of latest main
        if: steps.hash.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/nix-npm-hash-update
          git add flake.nix
          git commit -m "chore: update Nix npmDepsHash for web dependencies"
          # Fetch the bot branch first so --force-with-lease has a remote
          # tracking ref to anchor on; otherwise it fails with "stale info".
          git fetch origin chore/nix-npm-hash-update || true
          # --force-with-lease (not --force) so a maintainer's manual edit
          # on the bot branch is not silently clobbered.
          git push --force-with-lease origin chore/nix-npm-hash-update

      - name: Open or refresh PR with auto-merge
        if: steps.hash.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          OLD_HASH: ${{ steps.hash.outputs.current }}
          NEW_HASH: ${{ steps.hash.outputs.hash }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # PR body must contain `## Checklist` + "I understand the code
          # I am submitting" to satisfy pr-template-check.yml.
          {
            echo "<!-- nix-npm-hash: ${NEW_HASH} -->"
            echo
            echo "Automated hash bump triggered by web/package-lock.json change in ${TRIGGER_SHA}."
            echo
            echo "**Old:** \`${OLD_HASH}\`  "
            echo "**New:** \`${NEW_HASH}\`"
            echo
            echo "Auto-merge squashes this onto main once the required checks pass. The \`Nix Build Web\` PR-CI job re-runs \`nix build .#aoe-with-web\` against the merged tree."
            echo
            echo "## Checklist"
            echo
            echo "- [x] I understand the code I am submitting"
            echo "- [x] New and existing tests pass"
            echo "- [x] Documentation was updated where necessary"
            echo
            echo "## AI Usage"
            echo
            echo "- [x] No AI was used"
          } > /tmp/pr-body.md

          gh label create automated \
            --color "ededed" \
            --description "Automated bot PR" \
            --force >/dev/null 2>&1 || true

          PR_NUMBER=$(gh pr list \
            --head chore/nix-npm-hash-update \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            # Capture URL from gh pr create directly; gh pr list right
            # after creation can miss the new PR due to search-index lag.
            PR_URL=$(gh pr create \
              --base main \
              --head chore/nix-npm-hash-update \
              --title "chore: update Nix npmDepsHash for web dependencies" \
              --body-file /tmp/pr-body.md \
              --label automated)
            PR_NUMBER="${PR_URL##*/}"
          else
            gh pr edit "$PR_NUMBER" --body-file /tmp/pr-body.md
          fi

          # Fails loudly if "Allow auto-merge" is disabled at repo level.
          gh pr merge "$PR_NUMBER" --auto --squash
